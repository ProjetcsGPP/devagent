components:
  schemas:
    AcaoAnotacaoAlinhamento:
      type: object
      description: |-
        Serializer base para models que herdam de AuditableModel.

        Expoe os campos de auditoria como read-only no output da API.
        Os campos são preenchidos automaticamente pelo AuditableMixin
        no perform_create/perform_update — nunca pelo cliente.

        Uso:
            class AcaoSerializer(AuditableModelSerializer):
                class Meta(AuditableModelSerializer.Meta):
                    model = Acoes
                    fields = AuditableModelSerializer.Meta.fields + [
                        "strapelido",
                        "strdescricaoacao",
                        # ... campos específicos
                    ]

        Campos de auditoria incluídos automaticamente (todos read-only):
          created_by_id   — ID do usuário que criou
          created_by_name — snapshot do username na criação
          updated_by_id   — ID do usuário da última alteração
          updated_by_name — snapshot do username na alteração
          created_at      — timestamp de criação
          updated_at      — timestamp da última alteração
      properties:
        created_by_id:
          type: integer
          readOnly: true
        created_by_name:
          type: string
          readOnly: true
        updated_by_id:
          type: integer
          readOnly: true
        updated_by_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        idacaoanotacaoalinhamento:
          type: integer
          readOnly: true
        idacao_id:
          type: integer
        idtipoanotacaoalinhamento_id:
          type: integer
          nullable: true
        strdescricao:
          type: string
      required:
      - created_at
      - created_by_id
      - created_by_name
      - idacao_id
      - idacaoanotacaoalinhamento
      - strdescricao
      - updated_at
      - updated_by_id
      - updated_by_name
    AcaoDestaque:
      type: object
      description: |-
        Serializer base para models que herdam de AuditableModel.

        Expoe os campos de auditoria como read-only no output da API.
        Os campos são preenchidos automaticamente pelo AuditableMixin
