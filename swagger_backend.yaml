openapi: 3.0.3
info:
  title: GPP Plataforma 2.0 — API
  version: 2.0.0
  description: |
    ## Bem-vindo à API da Plataforma GPP 2.0

    Esta documentação descreve todos os endpoints da API REST da Plataforma GPP 2.0.

    ---

    ## 🔐 Como autenticar

    Todos os endpoints (exceto os da seção **0 - Autenticação**) exigem uma sessão ativa. Siga os passos abaixo antes de usar qualquer outro método:

    1. Localize a seção **0 - Autenticação** no menu
    2. Abra o endpoint **POST /api/accounts/login/**
    3. Clique em **Try it out**
    4. Preencha o body com suas credenciais:

    ```json
    {
      "username": "seu.usuario",
      "password": "sua_senha",
      "app_context": "PORTAL"
    }
    ```

    5. Clique em **Execute**
    6. Aguarde o retorno **200 OK** — a sessão será criada automaticamente no browser
    7. A partir deste momento, todos os endpoints estarão disponíveis nesta aba

    > ⚠️ **Importante:** o login deve ser feito diretamente nesta página do Swagger. Sessões criadas externamente (Postman, scripts) não são compartilhadas com o browser.

    ---

    ## 🍪 Mecanismo de autenticação

    A API utiliza **SessionAuthentication** com cookies HttpOnly por aplicação. O nome do cookie varia conforme o `app_context` usado no login: `gpp_session_PORTAL`, `gpp_session_CARGA_ORG_LOT`, `gpp_session_ACOES_PNGI`, etc. O browser envia o cookie correto automaticamente em todas as requisições desta aba.

    ---

    ## 📋 Estrutura dos módulos

    | Seção | Descrição |
    |---|---|
    | **0 - Autenticação** | Login, logout e resolução de usuário |
    | **1 - Usuários** | Perfis, roles, permissões e overrides |
    | **2 - Portal** | Dashboard e aplicações visíveis no portal |
    | **3 - Ações PNGI** | Ações, prazos, anotações e destaques |
    | **4 - Carga Org/Lot** | Carga de organogramas e loteamentos |
    | **5 - Utilitários** | Health check e logs de frontend |
paths:
  /api/accounts/aplicacoes/:
    get:
      operationId: accounts_aplicacoes_list
      description: |-
        Retorna as aplicações disponíveis ao usuário autenticado no contexto pós-login.

        **Autenticação:** requer sessão ativa via cookie HttpOnly `gpp_session_<APP>` (ex: `gpp_session_PORTAL`). O frontend deve enviar todas as requisições com `withCredentials: true`.

        **Permissões:** requer autenticação (`IsAuthenticated`).

        **Escopo de visibilidade:**
        - `PORTAL_ADMIN` ou `superuser`: visualiza todas as aplicações sem restrição.
        - usuário comum: visualiza apenas as aplicações nas quais possui `UserRole`, com filtro adicional para apps não bloqueadas e prontas para produção.
      summary: Listar aplicações visíveis ao usuário
      tags:
      - 1 - Usuários
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Aplicacao'
              examples:
                ListaDeAplicaçõesDisponíveis:
                  value:
                  - - idaplicacao: 1
                      codigointerno: PORTAL
                      nomeaplicacao: Portal GPP
                    - idaplicacao: 3
                      codigointerno: ACOES_PNGI
                      nomeaplicacao: Ações PNGI
                  summary: Resposta 200 — aplicações visíveis ao usuário autenticado
          description: Lista de aplicações visíveis ao usuário retornada com sucesso.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoListBadRequestError'
              examples:
                ErroGenérico:
                  value:
                    detail: Requisição inválida.
                    code: bad_request
                  summary: Erro 400 — requisição inválida
          description: Erro genérico de requisição.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoUnauthorizedErrorList'
              examples:
                NãoAutenticado:
                  value:
                    detail: As credenciais de autenticação não foram fornecidas.
                    code: not_authenticated
                  summary: Erro 401 — cookie de sessão ausente ou inválido
          description: Não autenticado — sessão ausente ou expirada.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoForbiddenErrorList'
              examples:
                SemAcesso_àAplicação:
                  value:
                    detail: Usuário sem acesso  à aplicação.
                    code: permission_denied
                  summary: Erro 403 — usuário sem acesso permitido
          description: Proibido — usuário autenticado, mas sem acesso ao recurso solicitado.
  /api/accounts/aplicacoes/{idaplicacao}/:
    get:
      operationId: accounts_aplicacoes_retrieve
      description: |-
        Retorna os dados de uma aplicação específica visível ao usuário autenticado.

        **Autenticação:** requer sessão ativa via cookie HttpOnly `gpp_session_<APP>` (ex: `gpp_session_PORTAL`). O frontend deve enviar todas as requisições com `withCredentials: true`.

        **Permissões:** requer autenticação (`IsAuthenticated`).

        **Escopo de visibilidade:**
        - `PORTAL_ADMIN` ou `superuser`: pode consultar qualquer aplicação.
        - usuário comum: pode consultar apenas aplicações nas quais possui `UserRole`.
      summary: Detalhar aplicação visível ao usuário
      parameters:
      - in: path
        name: idaplicacao
        schema:
          type: integer
        description: ID da aplicação a ser consultada.
        required: true
        examples:
          Aplicação3:
            value: 3
            summary: Aplicação 3
      tags:
      - 1 - Usuários
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aplicacao'
              examples:
                AplicaçãoEncontrada:
                  value:
                    idaplicacao: 3
                    codigointerno: ACOES_PNGI
                    nomeaplicacao: Ações PNGI
                  summary: Resposta 200 — aplicação visível ao usuário
          description: Aplicação retornada com sucesso.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoBadRequestErrorRetrieve'
              examples:
                ErroGenérico:
                  value:
                    detail: Requisição inválida.
                    code: bad_request
                  summary: Erro 400 — requisição inválida
          description: Erro genérico de requisição.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoUnauthorizedErrorRetrieve'
              examples:
                NãoAutenticado:
                  value:
                    detail: As credenciais de autenticação não foram fornecidas.
                    code: not_authenticated
                  summary: Erro 401 — cookie de sessão ausente ou inválido
          description: Não autenticado — sessão ausente ou expirada.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoForbiddenErrorRetrieve'
              examples:
                SemAcesso_àAplicação:
                  value:
                    detail: Usuário sem acesso  à aplicação.
                    code: permission_denied
                  summary: Erro 403 — usuário sem acesso  à aplicação
          description: Proibido — usuário autenticado, mas sem acesso  à aplicação
            solicitada.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoNotFoundErrorRetrieve'
              examples:
                AplicaçãoNãoEncontrada:
                  value:
                    detail: Não encontrado.
                    code: not_found
                  summary: Erro 404 — id inexistente ou fora do queryset visível
          description: Aplicação não encontrada para o ID informado ou fora do escopo
            visível.
  /api/accounts/auth/aplicacoes/:
    get:
      operationId: accounts_auth_aplicacoes_list
      description: |-
        Retorna a lista de aplicações públicas disponíveis para seleção na tela de login.

        **Acesso:** endpoint público (`AllowAny`).
        **Autenticação:** não requer autenticação.
        **Sessão:** não usa cookie de sessão.

        **Uso principal:** popular o seletor de aplicações (`app_context`) no frontend antes do login.

        **Filtro aplicado:** retorna apenas aplicações ativas e visíveis, ou seja, não bloqueadas e prontas para produção.
      summary: Listar aplicações públicas
      tags:
      - 5 - Utilitários
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AplicacaoPublica'
              examples:
                ListaDeAplicaçõesPúblicas:
                  value:
                  - - idaplicacao: 1
                      codigointerno: PORTAL
                      nomeaplicacao: Portal GPP
                    - idaplicacao: 2
                      codigointerno: SIGEF
                      nomeaplicacao: SIGEF
                  summary: Resposta 200 — aplicações disponíveis no login
          description: Lista de aplicações públicas retornada com sucesso.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoPublicaListBadRequestError'
              examples:
                ErroGenérico:
                  value:
                    detail: Requisição inválida.
                    code: bad_request
                  summary: Erro 400 — requisição inválida
          description: Erro genérico de requisição.
  /api/accounts/auth/aplicacoes/{codigointerno}/:
    get:
      operationId: accounts_auth_aplicacoes_retrieve
      description: |-
        Retorna os dados de uma aplicação pública específica pelo seu `codigointerno`.

        **Acesso:** endpoint público (`AllowAny`).
        **Autenticação:** não requer autenticação.
        **Sessão:** não usa cookie de sessão.

        **Uso principal:** consulta de uma aplicação exibida no seletor da tela de login.

        **Filtro aplicado:** somente aplicações ativas e visíveis são expostas por este endpoint.
      summary: Detalhar aplicação pública
      parameters:
      - in: path
        name: codigointerno
        schema:
          type: string
        description: 'Código interno da aplicação pública (ex: `PORTAL`, `SIGEF`).'
        required: true
        examples:
          AplicaçãoPORTAL:
            value: PORTAL
            summary: Aplicação PORTAL
      tags:
      - 5 - Utilitários
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoPublica'
              examples:
                AplicaçãoPúblicaEncontrada:
                  value:
                    idaplicacao: 1
                    codigointerno: PORTAL
                    nomeaplicacao: Portal GPP
                  summary: Resposta 200 — aplicação encontrada
          description: Aplicação pública retornada com sucesso.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoPublicaRetrieveBadRequestError'
              examples:
                ErroGenérico:
                  value:
                    detail: Requisição inválida.
                    code: bad_request
                  summary: Erro 400 — requisição inválida
          description: Erro genérico de requisição.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoPublicaNotFoundError'
              examples:
                AplicaçãoNãoEncontrada:
                  value:
                    detail: Não encontrado.
                    code: not_found
                  summary: Erro 404 — codigointerno inexistente
          description: Aplicação pública não encontrada.
  /api/accounts/auth/resolve-user/:
    post:
      operationId: accounts_auth_resolve_user_create
      description: |-
        Recebe um identificador (email ou username) e retorna o username canônico. Usado pelo frontend antes do login para normalizar o campo digitado pelo usuário.

        **Anti-enumeração (R-02):** o `404` é retornado tanto para identificadores inexistentes quanto para contas desativadas — sem distinguir os dois casos — para evitar que um atacante confirme a existência de um e-mail no sistema.

        Este endpoint é público (`AllowAny`). O frontend **não** precisa enviar cookie nem `withCredentials: true` nesta chamada.
      summary: Resolve username a partir de email ou username
      tags:
      - 0 - Autenticação
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  type: string
                  example: joao@gov.br
              required:
              - identifier
            examples:
              Request—PorE-mail:
                value:
                  identifier: joao@gov.br
                summary: Request — por e-mail
              Request—PorUsername:
                value:
                  identifier: joao.silva
                summary: Request — por username
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveUserSuccessResponse'
              examples:
                200—UsernameResolvido:
                  value:
                    username: joao.silva
                  summary: 200 — Username resolvido
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveUserBadRequestResponse'
              examples:
                400—IdentificadorVazio:
                  value:
                    detail: Identificador não informado.
                    code: invalid_request
                  summary: 400 — Identificador vazio
                400—IdentificadorMuitoLongo:
                  value:
                    detail: Identificador inválido.
                    code: invalid_request
                  summary: 400 — Identificador muito longo
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveUserNotFoundResponse'
              examples:
                404—NãoEncontrado:
                  value:
                    detail: Usuário não encontrado.
                    code: user_not_found
                  summary: 404 — Não encontrado
          description: ''
  /api/accounts/authz/version/:
    get:
      operationId: accounts_authz_version_retrieve
      description: |-
        Retorna o número de versão de autorização do usuário autenticado. Usado **exclusivamente** pelo frontend para invalidação de cache — não representa permissões reais e não deve ser usado em decisões de autorização.

        A versão começa em `0` quando o usuário ainda não possui um `UserAuthzState` (nenhuma mudança de permissão ocorreu desde a criação da conta). O valor é incrementado automaticamente a cada sync de permissões.

        Quando o valor de `authz_version` mudar desde o último check, o frontend deve refazer `GET /me/permissions/`, atualizar o JSON de navegação e invalidar caches locais (React Query / Zustand).
      summary: Versão de autorização do usuário autenticado
      tags:
      - 1 - Usuários
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzVersionResponse'
              examples:
                VersãoInicial—SemEstadoDeAutorização:
                  value:
                    authz_version: 0
                  summary: Usuário sem UserAuthzState registrado (versão lazy = 0)
                VersãoIncrementada—PermissõesJáSincronizadas:
                  value:
                    authz_version: 42
                  summary: Usuário com múltiplos ciclos de sync de permissões
          description: ''
        '401':
          description: Não autenticado — sessão ausente ou expirada.
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      description: |-
        Autentica o usuário e cria uma sessão por aplicação `gpp_session_<app_context>` (ex: `gpp_session_PORTAL`). Requer `username`, `password` e `app_context`.

        **Autenticação via cookie HttpOnly:** após o login bem-sucedido, o servidor retorna o header `Set-Cookie: gpp_session_<APP>=<session_key>; HttpOnly; SameSite=Lax`. O frontend **deve** usar `withCredentials: true` (axios) ou `credentials: 'include'` (fetch) em todas as requisições subsequentes para que o browser envie o cookie automaticamente.

        O header `X-CSRFToken` é rotacionado via `rotate_token()` a cada login — o frontend deve reler o cookie `csrftoken` e incluir o novo valor no header `X-CSRFToken` nas próximas requisições mutantes (POST/PUT/PATCH/DELETE).
      summary: Login via sessão
      tags:
      - 0 - Autenticação
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: joao.silva
                password:
                  type: string
                  example: senha123
                app_context:
                  type: string
                  example: PORTAL
              required:
              - username
              - password
              - app_context
            examples:
              Request—LoginNoPORTAL:
                value:
                  username: joao.silva
                  password: senha123
                  app_context: PORTAL
                summary: Request — login no PORTAL
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
              examples:
                200—LoginRealizado:
                  value:
                    detail: Login realizado com sucesso
                  summary: 200 — Login realizado
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginBadRequestResponse'
              examples:
                400—CamposAusentes:
                  value:
                    detail: Credenciais ou app_context não informados.
                    code: invalid_request
                  summary: 400 — Campos ausentes
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginUnauthorizedResponse'
              examples:
                401—CredenciaisInválidas:
                  value:
                    detail: Credenciais inválidas.
                    code: invalid_credentials
                  summary: 401 — Credenciais inválidas
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginForbiddenResponse'
              examples:
                403—AplicaçãoInválida:
                  value:
                    detail: Aplicação inválida ou bloqueada.
                    code: invalid_app
                  summary: 403 — Aplicação inválida
                403—SemRoleNaAplicação:
                  value:
                    detail: Usuário sem acesso  à aplicação informada.
                    code: no_role
                  summary: 403 — Sem role na aplicação
          description: ''
  /api/accounts/logout/:
    post:
      operationId: accounts_logout_session
      description: |-
        Encerra a sessão ativa e revoga o registro em AccountsSession.

        Requer que o frontend envie o cookie de sessão (`gpp_session_<APP>`) via `withCredentials: true` (axios) ou `credentials: 'include'` (fetch). Após o logout, o cookie deve ser removido pelo frontend.
      summary: Logout da sessão atual
      tags:
      - 0 - Autenticação
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccessResponse'
              examples:
                200—LogoutRealizado:
                  value:
                    detail: Logout realizado
                  summary: 200 — Logout realizado
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutUnauthorizedResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutForbiddenResponse'
              examples:
                403—NãoAutenticado(sessãoExpiradaOuCookieAusente):
                  value:
                    detail: As credenciais de autenticação não foram fornecidas.
                  summary: 403 — Não autenticado (sessão expirada ou cookie ausente)
          description: ''
  /api/accounts/logout/{app_slug}/:
    post:
      operationId: accounts_logout_app
      description: |-
        Revoga a sessão da app informada via `app_slug` e apaga o cookie `gpp_session_<APP>` correspondente.

        Este endpoint **não exige autenticação** — a identificação da sessão é feita diretamente pelo cookie `gpp_session_<APP>` presente na requisição. O frontend deve enviar `credentials: 'include'` para que o browser inclua o cookie automaticamente.

        Se o cookie não estiver presente, o endpoint retorna `200` com mensagem indicando que não havia sessão ativa — não retorna erro.
      summary: Logout de uma aplicação específica
      parameters:
      - in: path
        name: app_slug
        schema:
          type: string
        description: 'Slug (código interno) da aplicação a deslogar (ex: `portal`,
          `sigef`).'
        required: true
      tags:
      - 0 - Autenticação
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          description: Logout realizado ou sessão já inexistente
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutAppBadRequestResponse'
              examples:
                400—AppInválida:
                  value: App inválida
                  summary: 400 — App inválida
          description: ''
  /api/accounts/me/:
    get:
      operationId: accounts_me_retrieve
      description: |-
        Retorna os dados do usuário autenticado na sessão atual: profile, roles e apps com acesso.

        A autenticação é realizada via **sessão Django** — o cookie `gpp_session_<APP>` (HttpOnly) é enviado automaticamente pelo browser. Em chamadas via JavaScript/Axios/Fetch, o frontend deve usar `withCredentials: true` para garantir o envio do cookie de sessão.

        Este endpoint não aceita tokens JWT. A sessão é vinculada ao contexto de aplicação (`app_context`) definido no momento do login.
      summary: Dados do usuário autenticado
      tags:
      - 1 - Usuários
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
              examples:
                Resposta200—UsuárioAutenticado:
                  value:
                    id: 42
                    username: joao.silva
                    email: joao.silva@orgao.gov.br
                    name: João da Silva
                    is_portal_admin: false
                    orgao: Secretaria de Planejamento
                    status_usuario_id: 1
                    roles:
                    - role: GESTOR
                      aplicacao: PNGI
                  summary: Dados completos do usuário autenticado
                  description: Exemplo real de retorno para um usuário ativo com role
                    no Portal.
          description: ''
        '401':
          description: Não autenticado — sessão ausente ou expirada.
  /api/accounts/me/permissions/:
    get:
      operationId: accounts_me_permissions_retrieve
      description: |-
        Retorna a role e as permissões do usuário autenticado na aplicação da sessão atual (`app_context`).

        A autenticação é realizada via **sessão Django** — o cookie `gpp_session_<APP>` (HttpOnly) é enviado automaticamente pelo browser. Em chamadas via JavaScript/Axios/Fetch, o frontend deve usar `withCredentials: true` para garantir o envio do cookie de sessão.

        O `app_context` é resolvido pelo `AppContextMiddleware` a partir do cookie de sessão e da tabela `AccountsSession`. O resultado é gravado diretamente em `request.app_context` — este endpoint depende obrigatoriamente desse middleware estar ativo na requisição.
      summary: Permissões do usuário na app atual
      tags:
      - 1 - Usuários
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MePermission'
              examples:
                Resposta200—RoleEPermissões:
                  value:
                    role: GESTOR
                    granted:
                    - programas.view
                    - usuarios.manage
                  summary: Usuário autenticado com role GESTOR na app atual
          description: ''
        '400':
          description: Sem app_context na sessão.
        '401':
          description: Não autenticado — sessão ausente ou expirada.
        '404':
          description: App não encontrada ou bloqueada, ou usuário sem role na aplicação.
  /api/accounts/permission-overrides/:
    get:
      operationId: accounts_permission_overrides_list
      description: |-
        Retorna a lista de overrides de permissão (`UserPermissionOverride`).

