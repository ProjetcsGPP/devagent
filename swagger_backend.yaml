  /api/accounts/users/:
    post:
      operationId: accounts_users_create
      description: |-
        Cria atomicamente um `auth.User` e seu `UserProfile` vinculado.

        **Autenticação:** requer sessão ativa via cookie HttpOnly `gpp_session_<APP>` (ex: `gpp_session_PORTAL`). O frontend deve enviar todas as requisições com `withCredentials: true`.

        **Permissões:**
        - `401 Unauthorized` — sessão ausente ou expirada (não autenticado).
        - `403 Forbidden` — autenticado, mas sem a permissão `CanCreateUser` ou fora do escopo de aplicações que o operador gerencia.

        **Campo `password`:** write-only. Nunca é retornado na resposta.

        **Atomicidade:** criação do `User` e do `UserProfile` ocorre em uma única transação — em caso de falha, nenhum registro parcial é persistido.
      summary: Criar usuário (sem role)
      tags:
      - 1 - Usuários
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreate'
              examples:
                UsuárioCriado:
                  value:
                    username: joao.silva
                    email: joao.silva@gov.br
                    first_name: João
                    last_name: Silva
                    profile:
                      cpf: 000.000.000-00
                      telefone: (27) 99999-0000
                  summary: Resposta 201 — criação bem-sucedida
          description: Usuário criado com sucesso. O campo `password` não é retornado.
        '400':
          description: Dados de entrada inválidos.
        '401':
          description: Não autenticado — sessão ausente ou expirada.
        '403':
          description: Proibido — autenticado, mas sem permissão `CanCreateUser` ou
            fora do escopo de aplicações gerenciadas pelo operador.
  /api/accounts/users/create-with-role/:
    post:
      operationId: accounts_users_create_with_role_create
      description: |-
        Cria atomicamente `auth.User` + `UserProfile` + `UserRole` e dispara sincronização de permissões via `sync_user_permissions`.

        **Autenticação:** requer sessão ativa via cookie HttpOnly `gpp_session_<APP>` (ex: `gpp_session_PORTAL`). O frontend deve enviar todas as requisições com `withCredentials: true`.

        **Permissões:**
        - `401 Unauthorized` — sessão ausente ou expirada (não autenticado).
        - `403 Forbidden (papel insuficiente)` — autenticado, mas não é `PORTAL_ADMIN` nem `superuser`.
        - `403 Forbidden (escopo)` — é `PORTAL_ADMIN`, mas a `aplicacao` de destino está fora das aplicações que o operador gerencia.

        **Atomicidade:** `User`, `UserProfile`, `UserRole` e o sync de permissões ocorrem em uma única transação — em caso de falha, nenhum registro parcial é persistido.

        **Resposta:** retorna um `dict` customizado com os dados do usuário criado, sua role e a aplicação vinculada.
      summary: Criar usuário com role (fluxo completo)
      tags:
      - 1 - Usuários
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateWithRole'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateWithRole'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreateWithRole'
        required: true
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '201':
          description: Usuário criado com role e permissões sincronizadas.
        '400':
          description: Dados de entrada inválidos.
        '401':
          description: Não autenticado — sessão ausente ou expirada.
        '403':
          description: Proibido — papel insuficiente ou operador fora do escopo da
            aplicação de destino.
